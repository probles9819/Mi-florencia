<script>
document.addEventListener("DOMContentLoaded", function() {

  function toggleDay(id) {
    document.getElementById(id)?.classList.toggle('open');
  }

  function toggleTip(id) {
    document.getElementById(id)?.classList.toggle('open');
  }

  function openModal(id) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
  }

  function closeModal(id) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.remove('active');
      document.body.style.overflow = '';
    }
  }

  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', function(e) {
      if (e.target === this) {
        this.classList.remove('active');
        document.body.style.overflow = '';
      }
    });
  });

  function showImgTab(group, idx) {
    if (group === 'tren-ida') {
      document.querySelectorAll('[id^="tren-ida-img"]').forEach((el,i) => {
        el.classList.toggle('active', i === idx);
      });
      document.querySelectorAll('#modal-tren-ida .img-tab').forEach((el,i) => {
        el.classList.toggle('active', i === idx);
      });
    }
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', 
        (i === 0 && name === 'itinerario') ||
        (i === 1 && name === 'tips')
      );
    });

    document.getElementById('tab-itinerario')?.classList.toggle('active', name === 'itinerario');
    document.getElementById('tab-tips')?.classList.toggle('active', name === 'tips');
  }

  // Hacer funciones accesibles desde HTML (onclick)
  window.toggleDay = toggleDay;
  window.toggleTip = toggleTip;
  window.openModal = openModal;
  window.closeModal = closeModal;
  window.showImgTab = showImgTab;
  window.switchTab = switchTab;

});
</script>
